version: 2
updates:
  # Monitor npm dependencies (adjust if your repo uses another ecosystem)
  - package-ecosystem: "npm"
    directory: "/" # Location of package.json
    schedule:
      interval: "weekly" # Run once per week to conserve quota
      day: "sunday"
      time: "00:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    reviewers:
      - "CharlesMbillo" # Adjust to your GitHub username/team

  # Monitor GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/" # Location of workflow files
    schedule:
      interval: "monthly" # Less frequent since Actions updates are slower
      day: "1"
      time: "00:00"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "ci"
